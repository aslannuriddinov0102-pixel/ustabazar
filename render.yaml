databases:
  - name: ustabazar-db
    plan: free
    databaseName: ustabazar
    user: ustabazar

services:
  - type: web
    name: ustabazar
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ustabazar-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: RUN_TELEGRAM_BOT
        value: "true"
      - key: VAPID_PUBLIC
        sync: false
      - key: VAPID_PRIVATE
        sync: false
      - key: PAYME_MERCHANT_ID
        sync: false
      - key: PAYME_KEY
        sync: false
      - key: CLICK_MERCHANT_ID
        sync: false
      - key: CLICK_SERVICE_ID
        sync: false
      - key: CLICK_SECRET_KEY
        sync: false
