function navExtras(user) {
  const ids = new Set(NAV_PRIMARY.map(p => p.id));
  const rolePage = user?.role === 'admin' ? 'admin' : user?.role === 'master' ? 'dashboard' : user ? 'customer' : 'auth';

  if (!ids.has(rolePage)) {
    const rp = PAGES.find(p => p.id === rolePage);
    if (rp) list.unshift(rp);
  }
  return list;
}

const fmt = (n) => (Number(n) || 0).toLocaleString('uz-UZ') + " so'm";
const parsePrice = (s) => parseInt(String(s).replace(/\s/g, ''), 10) || 0;
const fmtTime = (iso) => iso ? new Date(iso).toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit', hour12: false }) : '';
const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString('uz-UZ', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
const normalizePhone = (phone) => {
  const digits = String(phone || '').replace(/\D/g, '');
  if (digits.length === 9) return '+998' + digits;
  if (digits.startsWith('998') && digits.length === 12) return '+' + digits;
  return '+' + digits;
};

function mapApiMessage(m, userRole) {
  const mine = m.from_role === userRole;
  return { id: m.id, from: mine ? 'user' : 'master', text: m.text, time: fmtTime(m.created_at) };

function orderStepIndex(status) {
  if (status === 'pending') return 0;

async function api(path, opts = {}, token) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (token) headers.Authorization = 'Bearer ' + token;
  const res = await fetch(API_URL + path, { ...opts, headers });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'API xato');
  return data;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function subscribePush(token) {
  if (!('PushManager' in window) || !token) throw new Error('Push qo\'llab-quvvatlanmaydi yoki kirish kerak');
  const reg = await navigator.serviceWorker.ready;
  const { publicKey } = await api('/push/vapid-public');
  let sub = await reg.pushManager.getSubscription();
  if (!sub) {
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(publicKey),
    });
  }
  await api('/push/subscribe', { method: 'POST', body: JSON.stringify(sub.toJSON()) }, token);
}

function MapPage({ setPage, setSelectedMaster, filter }) {
  const mapRef = useRef(null);

  const [masters, setMasters] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    setLoading(true);
    const params = new URLSearchParams();
    if (filter?.city) params.set('city', filter.city);
    api('/masters/map?' + params).then(setMasters).catch(() => setMasters([])).finally(() => setLoading(false));
  }, [filter?.city]);

  useEffect(() => {
    if (!mapRef.current || !window.L || loading) return;
    if (mapInst.current) { mapInst.current.remove(); mapInst.current = null; }
    const center = masters[0] ? [masters[0].lat, masters[0].lng] : [41.2995, 69.2401];
    const map = window.L.map(mapRef.current).setView(center, 11);
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap',
    }).addTo(map);
    masters.forEach(m => {
      const marker = window.L.marker([m.lat, m.lng]).addTo(map);
      marker.bindPopup(`<b>${m.name}</b><br>${m.title}<br>⭐ ${m.rating}<br>${m.city}`);
      marker.on('click', () => {
        if (setSelectedMaster) setSelectedMaster(m);
        setPage('profile');
      });
    });
    if (masters.length > 1) {
      const bounds = window.L.latLngBounds(masters.map(m => [m.lat, m.lng]));
      map.fitBounds(bounds, { padding: [40, 40] });
    }
    mapInst.current = map;
    return () => { if (mapInst.current) { mapInst.current.remove(); mapInst.current = null; } };
  }, [masters, loading, setPage, setSelectedMaster]);

  return (
    <div className="page-enter max-w-7xl mx-auto px-4 sm:px-6 py-8">
      <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div>
          <h1 className="font-display text-2xl sm:text-3xl font-bold">GPS xarita</h1>

        <button onClick={() => setPage('masters')} className="px-4 py-2 border border-ink-200 text-sm font-medium rounded-xl hover:bg-ink-50">← Ro'yxat</button>
      </div>
      <div ref={mapRef} className="w-full h-[420px] sm:h-[520px] rounded-2xl border border-ink-200 overflow-hidden shadow-sm z-0" />
      <p className="text-xs text-ink-400 mt-3 text-center">Marker ustiga bosing — usta profiliga o'tasiz</p>
    </div>
  );
}

  const [booking, setBooking] = useState(false);
  const [bookError, setBookError] = useState('');

  useEffect(() => {
    if (!selectedMaster?.id) return;
    api('/masters/' + selectedMaster.id).then(setMasterData).catch(() => setMasterData(selectedMaster));
  }, [selectedMaster?.id]);

  const M = masterData ? {
    ...MASTER,
    id: masterData.id,
    name: masterData.name,
    title: masterData.title,
    bio: masterData.bio || MASTER.bio,
    avatar: masterAvatar(masterData.name),
    verified: !!masterData.verified,
    location: (masterData.city || 'Toshkent') + ", O'zbekiston",

                <p className="text-ink-500">{M.title}</p>

                  <div className="flex items-center gap-1"><StarRating rating={M.rating} /><span className="font-semibold">{M.rating}</span><span className="text-ink-400">({MASTER.reviews} sharh)</span></div>
                  <span className="text-ink-400">📍 {M.location}</span>

/* ─── 3. Order + Chat Page ─── */
function OrderChatPage({ setPage, token, user, currentOrder, setCurrentOrder, wsEvent }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [showReview, setShowReview] = useState(false);
  const [rating, setRating] = useState(5);
  const [reviewText, setReviewText] = useState('');
  const [reviewSent, setReviewSent] = useState(false);
  const [sending, setSending] = useState(false);
  const chatEnd = useRef(null);
  const O = currentOrder;
  const userRole = user?.role || 'customer';
  const chatRole = userRole === 'master' ? 'master' : 'customer';
  const partnerName = userRole === 'master' ? O?.customer_name : O?.master_name;
  const stepIdx = orderStepIndex(O?.status);

  const loadMessages = () => {
    if (!token || !O?.id) return;
    api('/orders/' + O.id + '/messages', {}, token)
      .then(msgs => setMessages(msgs.map(m => mapApiMessage(m, chatRole))))
      .catch(() => {});
  };

  useEffect(() => { loadMessages(); }, [O?.id, token]);
  useEffect(() => {
    if (!wsEvent || !O) return;
    if (wsEvent.type === 'chat' && wsEvent.order_id === O.id) loadMessages();
    if (wsEvent.type === 'order_update' && wsEvent.order_id === O.id) {
      api('/orders/' + O.id, {}, token).then(setCurrentOrder).catch(() => {});
    }
  }, [wsEvent]);
  useEffect(() => { chatEnd.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

  const send = async () => {
    if (!input.trim() || !token || !O?.id) return;
    setSending(true);
    try {
      await api('/orders/' + O.id + '/messages', { method: 'POST', body: JSON.stringify({ text: input.trim() }) }, token);
      setInput('');
      loadMessages();
    } catch {}
    setSending(false);
  };

  const updateStatus = async (status) => {
    if (!token || !O?.id) return;
    try {
      await api('/orders/' + O.id + '/status', { method: 'PATCH', body: JSON.stringify({ status }) }, token);
      const full = await api('/orders/' + O.id, {}, token);
      setCurrentOrder(full);
    } catch {}
  };

  if (!O) {
    return (
      <div className="page-enter max-w-lg mx-auto px-4 py-20 text-center">
        <p className="text-ink-500 mb-4">Buyurtma tanlanmagan</p>
        <button onClick={() => setPage(userRole === 'master' ? 'dashboard' : 'customer')} className="px-6 py-3 bg-brand-500 text-white rounded-xl font-semibold">Kabinetga</button>
      </div>
    );
  }

  return (
    <div className="page-enter max-w-7xl mx-auto px-4 sm:px-6 py-8">
      <div className="grid lg:grid-cols-5 gap-6 h-[calc(100vh-10rem)] min-h-[500px]">
        <div className="lg:col-span-2 space-y-4 overflow-y-auto">
          <div className="bg-white rounded-2xl border border-ink-100 p-5">
            <div className="flex items-center justify-between mb-4">
              <h2 className="font-display font-bold text-lg">Buyurtma tafsilotlari</h2>
              {statusBadge(O.status)}
            </div>
            <div className="space-y-3 text-sm">
              <div className="flex justify-between"><span className="text-ink-400">Buyurtma ID</span><span className="font-mono font-medium">{O.order_code}</span></div>
              <div className="flex justify-between"><span className="text-ink-400">Xizmat</span><span className="font-medium">{O.service}</span></div>
              <div className="flex justify-between"><span className="text-ink-400">Usta</span><span className="font-medium">{O.master_name}</span></div>
              <div className="flex justify-between"><span className="text-ink-400">Mijoz</span><span className="font-medium">{O.customer_name}</span></div>
              <div className="flex justify-between"><span className="text-ink-400">Sana</span><span className="font-medium">{fmtDate(O.created_at)}</span></div>
              <div className="flex justify-between"><span className="text-ink-400">Manzil</span><span className="font-medium text-right max-w-[60%]">{O.address || '—'}</span></div>
              <hr className="border-ink-100" />
              <div className="flex justify-between"><span className="text-ink-400">Xizmat</span><span>{fmt(O.price)}</span></div>
              <div className="flex justify-between"><span className="text-ink-400">Platforma to'lovi</span><span>{fmt(O.fee)}</span></div>
              <div className="flex justify-between font-bold text-base"><span>Jami</span><span className="text-brand-600">{fmt(O.total)}</span></div>
            </div>
            {O.status === 'pending' && userRole === 'customer' && (
              <button onClick={() => setPage('payment')} className="w-full mt-4 py-2.5 bg-brand-500 text-white font-semibold rounded-xl text-sm hover:bg-brand-600 transition-colors">To'lovga o'tish</button>
            )}
            {userRole === 'master' && O.status === 'pending' && (
              <button onClick={() => updateStatus('in_progress')} className="w-full mt-4 py-2.5 bg-emerald-500 text-white font-semibold rounded-xl text-sm">Qabul qilish</button>
            )}
            {userRole === 'master' && O.status === 'in_progress' && (
              <button onClick={() => updateStatus('completed')} className="w-full mt-4 py-2.5 bg-brand-500 text-white font-semibold rounded-xl text-sm">Ishni tugatish</button>
            )}
            {O.status !== 'disputed' && (
              <button onClick={async () => {
                const reason = prompt('Nizo sababi (qisqa):');
                if (!reason || !token) return;
                try {
                  await api('/disputes', { method: 'POST', body: JSON.stringify({ order_id: O.id, reason }) }, token);
                  const full = await api('/orders/' + O.id, {}, token);
                  setCurrentOrder(full);
                  alert('Nizo yuborildi — admin ko\'rib chiqadi');
                } catch (e) { alert(e.message); }
              }} className="w-full mt-2 py-2.5 border border-red-200 text-red-600 font-semibold rounded-xl text-sm hover:bg-red-50 transition-colors">⚠️ Nizo ochish</button>
            )}
            {O.status === 'completed' && userRole === 'customer' && (
              <button onClick={() => setShowReview(true)} className="w-full mt-2 py-2.5 bg-ink-100 text-ink-700 font-semibold rounded-xl text-sm hover:bg-ink-200 transition-colors">⭐ Sharh qoldirish</button>
            )}
          </div>

          <div className="bg-white rounded-2xl border border-ink-100 p-5">
            <h3 className="font-semibold text-sm mb-3">Buyurtma bosqichlari</h3>
            <div className="space-y-3">
              {['Buyurtma berildi', 'Usta qabul qildi', 'Jarayonda', "Bajarildi va to'landi"].map((step, i) => (
                <div key={i} className="flex items-center gap-3 text-sm">
                  <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${i <= stepIdx ? 'bg-brand-500 text-white' : 'bg-ink-100 text-ink-400'}`}>{i < stepIdx ? '✓' : i + 1}</div>
                  <span className={i <= stepIdx ? 'text-ink-800 font-medium' : 'text-ink-400'}>{step}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className="lg:col-span-3 bg-white rounded-2xl border border-ink-100 flex flex-col overflow-hidden">
          <div className="px-5 py-4 border-b border-ink-100 flex items-center gap-3">
            <img src={masterAvatar(partnerName || O.master_name)} alt="" className="w-10 h-10 rounded-xl" />
            <div>
              <div className="font-semibold text-sm">{partnerName || O.master_name}</div>
              <div className="text-xs text-emerald-600 flex items-center gap-1"><span className="status-dot bg-emerald-500"></span> Jonli chat</div>
            </div>
            <button onClick={() => setPage(userRole === 'master' ? 'dashboard' : 'customer')} className="ml-auto text-xs text-brand-600 font-medium hover:underline">← Orqaga</button>
          </div>

          <div className="px-5 py-2 bg-amber-50 border-b border-amber-100 text-xs text-amber-800 flex items-center gap-2">
            <span>🛡️</span> Escrow himoya — xabarlar API orqali saqlanadi
          </div>

          <div className="flex-1 overflow-y-auto p-5 space-y-3 chat-scroll">
            {messages.length === 0 && <p className="text-center text-ink-400 text-sm py-8">Birinchi xabarni yozing</p>}
            {messages.map(m => (
              <div key={m.id} className={`flex ${m.from === 'user' ? 'justify-end' : 'justify-start'}`}>
                <div className={`max-w-[75%] px-4 py-2.5 rounded-2xl text-sm ${m.from === 'user' ? 'bg-brand-500 text-white rounded-br-md' : 'bg-ink-100 text-ink-800 rounded-bl-md'}`}>
                  <p>{m.text}</p>
                  <div className={`text-[10px] mt-1 ${m.from === 'user' ? 'text-brand-200' : 'text-ink-400'}`}>{m.time}</div>
                </div>
              </div>
            ))}
            <div ref={chatEnd} />
          </div>

          <div className="p-4 border-t border-ink-100 flex gap-2">
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && !sending && send()}
              placeholder={token ? 'Xabar yozing...' : 'Kirish kerak'} disabled={!token}
              className="flex-1 px-4 py-2.5 bg-ink-50 border border-ink-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-400/40 focus:border-brand-400 disabled:opacity-50" />
            <button onClick={send} disabled={!token || sending} className="px-5 py-2.5 bg-brand-500 hover:bg-brand-600 disabled:opacity-50 text-white rounded-xl transition-colors">
              <Icon d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" className="w-5 h-5" />
            </button>
          </div>
        </div>
      </div>

      {showReview && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={() => setShowReview(false)}>
          <div className="bg-white rounded-2xl p-6 max-w-md w-full" onClick={e => e.stopPropagation()}>
            <h3 className="font-display font-bold text-lg mb-4">Ustaga sharh bering</h3>
            {reviewSent ? (
              <div className="text-center py-6">
                <div className="text-4xl mb-2">🎉</div>
                <p className="font-semibold">Rahmat! Sharhingiz qabul qilindi.</p>
                <p className="text-xs text-ink-400 mt-2">+100 sadoqat balli qo'shildi</p>
              </div>
            ) : (
              <>
                <div className="flex gap-2 justify-center mb-4">
                  {[1,2,3,4,5].map(i => (
                    <button key={i} onClick={() => setRating(i)} className={`text-2xl ${i <= rating ? 'opacity-100' : 'opacity-30'}`}>⭐</button>
                  ))}
                </div>
                <textarea value={reviewText} onChange={e => setReviewText(e.target.value)} rows={3} placeholder="Tajribangiz haqida yozing..."
                  className="w-full px-4 py-3 border border-ink-200 rounded-xl text-sm mb-4" />
                <div className="flex gap-2">
                  <button onClick={() => setShowReview(false)} className="flex-1 py-2.5 border border-ink-200 rounded-xl text-sm">Bekor</button>
                  <button onClick={async () => {
                    try {
                      if (token) await api('/reviews', { method: 'POST', body: JSON.stringify({ order_id: O.id, master_id: O.master_id, rating, text: reviewText }) }, token);
                      const pts = +(localStorage.getItem('ub_points') || 0) + 100;
                      localStorage.setItem('ub_points', pts);
                      setReviewSent(true);
                      setTimeout(() => setShowReview(false), 2000);
                    } catch { setReviewSent(true); }
                  }} className="flex-1 py-2.5 bg-brand-500 text-white rounded-xl text-sm font-semibold">Yuborish</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function PaymentPage({ setPage, currentOrder, token, setCurrentOrder }) {
  const [method, setMethod] = useState('card');
  const [paid, setPaid] = useState(false);
  const [paying, setPaying] = useState(false);
  const [payError, setPayError] = useState('');
  const O = currentOrder;

  const methodLabels = { card: 'Bank kartasi', payme: 'Payme', click: 'Click', uzcard: 'Uzcard', humo: 'Humo' };
  const methodLabel = methodLabels[method] || method;

  const finishPaid = async () => {
    const full = await api('/orders/' + O.id, {}, token);
    setCurrentOrder(full);
    setPaid(true);
  };

  const pollPayment = () => {
    let n = 0;
    const t = setInterval(async () => {
      n++;
      try {
        const st = await api('/payments/status/' + O.id, {}, token);
        if (st.paid) { clearInterval(t); await finishPaid(); setPaying(false); }
        else if (n > 40) { clearInterval(t); setPayError('To\'lov tasdiqlanmadi. Qayta urinib ko\'ring.'); setPaying(false); }
      } catch { if (n > 40) { clearInterval(t); setPaying(false); } }
    }, 3000);
  };

  const handlePay = async () => {
    if (!token || !O?.id) { setPayError('Avval kirish va buyurtma kerak'); return; }
    setPaying(true);
    setPayError('');
    try {
      if (method === 'payme') {
        const res = await api('/payments/payme', { method: 'POST', body: JSON.stringify({ order_id: O.id, amount: O.total }) }, token);
        if (res.mode === 'live' && res.url) { window.open(res.url, '_blank'); pollPayment(); return; }
      } else if (method === 'click') {
        const res = await api('/payments/click', { method: 'POST', body: JSON.stringify({ order_id: O.id, amount: O.total }) }, token);
        if (res.mode === 'live' && res.url) { window.open(res.url, '_blank'); pollPayment(); return; }
      }
      await api('/payments/confirm', { method: 'POST', body: JSON.stringify({ order_id: O.id, method }) }, token);
      await finishPaid();
    } catch (e) {
      setPayError(e.message);
    }
    setPaying(false);
  };

  if (!O) {
    return (
      <div className="page-enter max-w-lg mx-auto px-4 py-20 text-center">
        <p className="text-ink-500 mb-4">Buyurtma yo'q — avval usta tanlang</p>
        <button onClick={() => setPage('masters')} className="px-6 py-3 bg-brand-500 text-white rounded-xl font-semibold">Ustalar</button>
      </div>
    );
  }

  if (paid) {
    return (
      <div className="page-enter max-w-lg mx-auto px-4 py-20 text-center">
        <div className="w-20 h-20 mx-auto mb-6 rounded-full bg-emerald-100 flex items-center justify-center">
          <svg className="w-10 h-10 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h1 className="font-display text-2xl font-bold text-ink-900 mb-2">To'lov muvaffaqiyatli!</h1>
        <p className="text-ink-500 mb-2">{O.order_code} buyurtmasi tasdiqlandi.</p>
        <p className="text-ink-400 text-sm mb-8">{fmt(O.total)} {methodLabel} orqali to'landi</p>
        <div className="flex gap-3 justify-center flex-wrap">
          <button onClick={() => setPage('order')} className="px-6 py-3 bg-brand-500 text-white font-semibold rounded-xl hover:bg-brand-600 transition-colors">Buyurtma va chatga o'tish</button>
          <button onClick={() => setPage('landing')} className="px-6 py-3 border border-ink-200 font-medium rounded-xl hover:bg-ink-50 transition-colors">Bosh sahifaga</button>
        </div>
      </div>
    );
  }

  return (
    <div className="page-enter max-w-4xl mx-auto px-4 sm:px-6 py-8">
      <h1 className="font-display text-2xl font-bold text-ink-900 mb-8">To'lov</h1>

            <h2 className="font-semibold mb-4">To'lov usuli</h2>
            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">
              {[
                { id: 'card', label: 'Bank kartasi', icon: '💳' },
                { id: 'payme', label: 'Payme', icon: '🟢' },
                { id: 'click', label: 'Click', icon: '🔵' },
                { id: 'uzcard', label: 'Uzcard', icon: '💙' },
                { id: 'humo', label: 'Humo', icon: '❤️' },
              ].map(m => (
                <button key={m.id} onClick={() => setMethod(m.id)}
                  className={`p-4 rounded-xl border text-center transition-all ${method === m.id ? 'border-brand-400 bg-brand-50 ring-2 ring-brand-400/20' : 'border-ink-100 hover:border-ink-200'}`}>

/* ─── 8. Usta Onboarding ─── */
function OnboardingPage({ setPage, setUser, setToken }) {
  const [step, setStep] = useState(1);
  const [done, setDone] = useState(false);
  const [regError, setRegError] = useState('');
  const [registering, setRegistering] = useState(false);
  const [uploads, setUploads] = useState([]);
  const steps = ['Shaxsiy ma\'lumot', 'Hujjatlar', 'Kasbiy imtihon'];

  const handleDocPick = (e, type) => {
    const f = e.target.files?.[0];
    if (!f) return;
    if (f.size > 5 * 1024 * 1024) { alert('Fayl 5MB dan kichik bo\'lishi kerak'); return; }
    setUploads(prev => [...prev.filter(u => u.type !== type), { file: f, type, name: f.name }]);
  };

  const completeRegistration = async () => {
    setRegistering(true);
    setRegError('');
    try {
      const saved = JSON.parse(sessionStorage.getItem('ub_master_reg') || '{}');
      const data = await api('/auth/register', {
        method: 'POST',
        body: JSON.stringify({
          name: saved.name || 'Yangi Usta',
          phone: normalizePhone(saved.phone || '+998900000000'),
          password: saved.password || 'demo1234',
          role: 'master',
          title: 'Santexnik usta',
          city: 'Toshkent',
          category: 'Santexnika',
          bio: 'Usta Bazar orqali ro\'yxatdan o\'tdim',
        }),
      });
      for (const item of uploads) {
        const fd = new FormData();
        fd.append('file', item.file);
        fd.append('type', item.type);
        const res = await fetch(API_URL + '/upload', {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + data.token },
          body: fd,
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Hujjat yuklanmadi');
        }
      }
      sessionStorage.removeItem('ub_master_reg');
      setUser(data.user);
      setToken(data.token);
      localStorage.setItem('ub_token', data.token);
      setDone(true);
    } catch (e) {
      setRegError(e.message);
    }
    setRegistering(false);
  };

  if (done) {
    return (
      <div className="page-enter max-w-lg mx-auto px-4 py-20 text-center">
        <div className="w-20 h-20 mx-auto mb-6 rounded-full bg-emerald-100 flex items-center justify-center text-4xl">🎉</div>
        <h1 className="font-display text-2xl font-bold mb-2">Tabriklaymiz!</h1>
        <p className="text-ink-500 mb-2">Siz Usta Bazar platformasiga qabul qilindingiz.</p>
        <p className="text-sm text-ink-400 mb-8">API orqali ro'yxatdan o'tdingiz — endi buyurtmalar olishingiz mumkin.</p>
        <button onClick={() => setPage('dashboard')} className="px-8 py-3 bg-brand-500 text-white font-semibold rounded-xl hover:bg-brand-600 transition-colors">Panelga o'tish</button>
      </div>
    );
  }

  return (
    <div className="page-enter max-w-2xl mx-auto px-4 sm:px-6 py-10">
      <div className="text-center mb-8">
        <span className="text-xs font-bold text-brand-600 uppercase tracking-wider">Usta ro'yxatdan o'tish</span>
        <h1 className="font-display text-2xl font-bold mt-2">3 bosqichli tekshiruv</h1>
        <p className="text-ink-500 text-sm mt-1">Faqat 42% nomzod qabul qilinadi — sifat kafolati</p>
      </div>

      <div className="flex items-center justify-between mb-10 px-4">
        {steps.map((s,i) => (
          <div key={i} className="flex flex-col items-center flex-1 relative">
            <div className={`w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold z-10 ${step > i+1 ? 'bg-emerald-500 text-white' : step === i+1 ? 'bg-brand-500 text-white' : 'bg-ink-100 text-ink-400'}`}>
              {step > i+1 ? '✓' : i+1}
            </div>
            <span className="text-[10px] sm:text-xs text-ink-500 mt-2 text-center">{s}</span>
            {i < 2 && <div className={`absolute top-5 left-[60%] w-[80%] h-0.5 ${step > i+1 ? 'bg-emerald-500' : 'bg-ink-200'}`}></div>}
          </div>
        ))}
      </div>

      <div className="bg-white rounded-2xl border border-ink-100 p-6 sm:p-8">
        {step === 1 && (
          <div className="space-y-4">
            <h2 className="font-semibold text-lg mb-4">Shaxsiy ma'lumotlar</h2>
            {[['To\'liq ism', 'Jamshid Karimov'], ['Telefon', '+998 90 123 45 67'], ['Shahar', 'Toshkent'], ['Mutaxassislik', 'Santexnik'], ['Tajriba (yil)', '5']].map(([l,p],i) => (
              <div key={i}>
                <label className="text-xs text-ink-500 font-medium">{l}</label>
                <input defaultValue={p} className="w-full mt-1 px-4 py-2.5 border border-ink-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-400/40" />
              </div>
            ))}
          </div>
        )}
        {step === 2 && (
          <div className="space-y-4">
            <h2 className="font-semibold text-lg mb-4">Hujjatlarni yuklash</h2>
            {[
              { label: 'Pasport / ID karta', type: 'passport' },
              { label: 'Kasbiy sertifikat (agar bor)', type: 'certificate' },
              { label: 'Ish namunasi (foto)', type: 'portfolio' },
            ].map((doc, i) => {
              const uploaded = uploads.find(u => u.type === doc.type);
              return (
                <label key={i} className="block border-2 border-dashed border-ink-200 rounded-xl p-6 text-center hover:border-brand-400 hover:bg-brand-50/30 transition-colors cursor-pointer">
                  <input type="file" accept="image/*,.pdf" className="hidden" onChange={e => handleDocPick(e, doc.type)} />
                  <div className="text-2xl mb-2">{uploaded ? '✅' : '📄'}</div>
                  <div className="font-medium text-sm">{doc.label}</div>
                  <div className="text-xs text-ink-400 mt-1">{uploaded ? uploaded.name : 'Bosing — JPG, PNG, PDF (max 5MB)'}</div>
                </label>
              );
            })}
            <div className="flex items-center gap-2 text-xs text-emerald-600 bg-emerald-50 rounded-lg p-3">
              <span>🔒</span> Hujjatlar serverga xavfsiz yuklanadi (ro'yxatdan keyin saqlanadi)
            </div>
          </div>
        )}
        {step === 3 && (
          <div className="space-y-4">
            <h2 className="font-semibold text-lg mb-2">Kasbiy imtihon</h2>
            <p className="text-sm text-ink-500 mb-4">10 ta savol — 80% dan yuqori natija kerak</p>
            <div className="bg-ink-50 rounded-xl p-5">
              <div className="text-sm font-medium mb-3">Savol 3/10: Quvur oqishi aniqlanganda birinchi qadam nima?</div>
              {['Ustaga qo\'ng\'iroq qilish', 'Suv ventilini yopish', 'Rasmga olish', 'Hech narsa qilmaslik'].map((a,i) => (
                <label key={i} className={`flex items-center gap-3 p-3 rounded-lg cursor-pointer mb-2 transition-colors ${i === 1 ? 'bg-brand-50 border border-brand-200' : 'hover:bg-white'}`}>
                  <input type="radio" name="q" defaultChecked={i===1} className="accent-brand-500" />
                  <span className="text-sm">{a}</span>
                </label>
              ))}
            </div>
            <div className="w-full bg-ink-100 rounded-full h-2"><div className="bg-brand-500 h-2 rounded-full w-[30%]"></div></div>
            <div className="text-xs text-ink-400 text-center">Javob berildi: 3/10</div>
          </div>
        )}

        {regError && <p className="text-sm text-red-600 mt-4">{regError}</p>}
        <div className="flex gap-3 mt-8">
          {step > 1 && <button onClick={() => setStep(step-1)} className="flex-1 py-3 border border-ink-200 rounded-xl font-medium text-sm hover:bg-ink-50 transition-colors">Orqaga</button>}
          <button onClick={() => step < 3 ? setStep(step+1) : completeRegistration()} disabled={registering} className="flex-1 py-3 bg-brand-500 hover:bg-brand-600 disabled:opacity-60 text-white font-semibold rounded-xl transition-colors">
            {step < 3 ? 'Keyingi bosqich' : (registering ? 'Ro\'yxatdan o\'tmoqda...' : 'Imtihonni yakunlash')}
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState('landing');
  const [user, setUser] = useState(null);
  const [token, setToken] = useState(() => localStorage.getItem('ub_token'));
  const [masterFilter, setMasterFilter] = useState({ city: 'Toshkent', q: '', category: '' });
  const [selectedMaster, setSelectedMaster] = useState(null);
  const [currentOrder, setCurrentOrder] = useState(null);
  const [wsEvent, setWsEvent] = useState(null);

  useEffect(() => {
    if (!token) return;
    api('/auth/me', {}, token).then(setUser).catch(() => {
      localStorage.removeItem('ub_token');
      setToken(null);
    });
  }, [token]);

  useEffect(() => {
    if (!token) return;
    const ws = new WebSocket(WS_URL);
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      setWsEvent({ ...msg, _t: Date.now() });
      const noteText = msg.text || (msg.type === 'new_order' ? 'Yangi buyurtma: ' + msg.order_code : msg.type === 'order_update' ? 'Buyurtma yangilandi' : msg.type === 'chat' ? 'Yangi xabar' : 'Yangilanish');
      try {
        const notes = JSON.parse(localStorage.getItem('ub_notifs') || '[]') || DEFAULT_NOTIFS;
        notes.unshift({ id: Date.now(), text: noteText, time: 'Hozir', read: false });
        localStorage.setItem('ub_notifs', JSON.stringify(notes.slice(0, 10)));
      } catch {}
    };
    return () => ws.close();
  }, [token]);

  const logout = () => { setUser(null); setToken(null); setCurrentOrder(null); localStorage.removeItem('ub_token'); };

  const renderPage = () => {
    switch (page) {
      case 'landing': return <LandingPage setPage={setPage} setMasterFilter={setMasterFilter} />;
      case 'masters': return <MastersListPage setPage={setPage} filter={masterFilter} setFilter={setMasterFilter} setSelectedMaster={setSelectedMaster} />;
      case 'map': return <MapPage setPage={setPage} setSelectedMaster={setSelectedMaster} filter={masterFilter} />;
      case 'profile': return <MasterProfilePage setPage={setPage} selectedMaster={selectedMaster} user={user} token={token} onBookOrder={setCurrentOrder} />;
      case 'order': return <OrderChatPage setPage={setPage} token={token} user={user} currentOrder={currentOrder} setCurrentOrder={setCurrentOrder} wsEvent={wsEvent} />;
      case 'customer': return <CustomerPage setPage={setPage} user={user} token={token} setCurrentOrder={setCurrentOrder} />;
      case 'dashboard': return <MasterDashboardPage setPage={setPage} user={user} token={token} setCurrentOrder={setCurrentOrder} />;
      case 'admin': return <AdminPanelPage user={user} token={token} setPage={setPage} />;
      case 'payment': return <PaymentPage setPage={setPage} currentOrder={currentOrder} token={token} setCurrentOrder={setCurrentOrder} />;
      case 'auth': return <AuthPage setPage={setPage} setUser={setUser} setToken={setToken} />;
      case 'onboarding': return <OnboardingPage setPage={setPage} setUser={setUser} setToken={setToken} />;
      case 'b2b': return <B2BPage setPage={setPage} />;
      case 'investors': return <InvestorsPage setPage={setPage} />;
      case 'roadmap': return <RoadmapPage setPage={setPage} />;
      case 'referral': return <ReferralPage token={token} />;
      case 'marketing': return <MarketingPage />;
      case 'legal': return <LegalPage />;
      default: return <LandingPage setPage={setPage} />;
    }
  };

  return (
    <div className="min-h-screen flex flex-col w-full overflow-x-clip">
      <Nav page={page} setPage={setPage} user={user} token={token} onLogout={logout} wsEvent={wsEvent} />
      <main className="flex-1 w-full overflow-x-clip">{renderPage()}</main>
      <Footer />
      <EmergencyFAB setPage={setPage} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
